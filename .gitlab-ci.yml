stages:
  - deploy

variables:
  APP_NAME: "deck-of-cards"
  BACKEND_PORT: "8070"
  FRONTEND_PORT: "8071"

deploy_to_sinbad2:
  stage: deploy
  before_script:
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $SSH_HOST >> ~/.ssh/known_hosts

  script:
    - echo "Enviando codigo a Sinbad2..."
    - ssh $REMOTE_USER@$SSH_HOST "mkdir -p ~/deploy_$APP_NAME"
    - scp -r ./* $REMOTE_USER@$SSH_HOST:~/deploy_$APP_NAME/

    - echo "Levantando contenedores con Docker Compose..."
    - ssh $REMOTE_USER@$SSH_HOST "cd ~/deploy_$APP_NAME && docker compose down --remove-orphans && docker compose up --build -d"

    - echo "Despliegue completado."
    - echo "Backend  -> http://$SSH_HOST:$BACKEND_PORT"
    - echo "Frontend -> http://$SSH_HOST:$FRONTEND_PORT"

  only:
    - main
